<div class="card" style="margin-top: 12%; padding: 35px 24px;">
    <div style="font-size: 55px; text-align: center; margin-bottom: 15px; filter: drop-shadow(0 4px 10px rgba(0,122,255,0.3));">💎</div>
    <h1 style="text-align: center; font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px;">Smart Huay Pro</h1>
    <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 28px;">กรุณาเลือกชื่อผู้ใช้และระบุรหัส PIN เพื่อลงชื่อเข้างาน</p>
    
    <div class="input-group">
        <label>บัญชีผู้ใช้พนักงาน</label>
        <select id="loginUser" style="font-size: 17px;"><option value="">⏳ กำลังเชื่อมต่อรายชื่อ...</option></select>
    </div>
    
    <div class="input-group" style="margin-bottom: 30px;">
        <label>รหัส PIN เข้าสู่ระบบ</label>
        <input type="password" id="loginPin" placeholder="••••" maxlength="4" inputmode="numeric" style="text-align: center; font-size: 26px; letter-spacing: 12px; font-weight: bold;">
    </div>
    
    <button class="btn btn-primary" onclick="handleLogin()" style="font-size: 17px; padding: 16px;">🔑 ยืนยันล็อกอินเข้าสู่ระบบ</button>
</div>
